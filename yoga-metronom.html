<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f5f0">
<title>Dechový metronomů</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f5f0;
    color: #1a1a18;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem 3rem;
    user-select: none;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888780;
    margin-bottom: 2.5rem;
  }

  .breath-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.5rem;
  }

  .breath-circle {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 1.5px solid #d3d1c7;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    margin-bottom: 1rem;
  }

  .breath-circle.inhale {
    background: #e1f5ee;
    border-color: #5dcaa5;
    transform: scale(1.06);
  }

  .breath-circle.exhale {
    background: #eeedfe;
    border-color: #afa9ec;
    transform: scale(0.96);
  }

  .breath-arrow {
    font-size: 36px;
    line-height: 1;
    transition: color 0.15s;
    color: #b4b2a9;
  }
  .inhale .breath-arrow { color: #0f6e56; }
  .exhale .breath-arrow { color: #534ab7; }

  .breath-word {
    font-size: 18px;
    font-weight: 500;
    color: #888780;
    transition: color 0.15s;
  }
  .inhale .breath-word { color: #0f6e56; }
  .exhale .breath-word { color: #534ab7; }

  .beat-counter {
    font-size: 13px;
    color: #b4b2a9;
    height: 18px;
  }

  .beats-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  .beat-dot {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #d3d1c7;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #b4b2a9;
    transition: background 0.08s, border-color 0.08s, transform 0.08s, color 0.08s;
  }

  .beat-dot.lit-in {
    background: #9fe1cb;
    border-color: #1d9e75;
    color: #085041;
    transform: scale(1.18);
  }
  .beat-dot.lit-out {
    background: #cecbf6;
    border-color: #7f77dd;
    color: #3c3489;
    transform: scale(1.18);
  }

  .controls {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .row label {
    font-size: 13px;
    color: #888780;
    width: 44px;
    flex-shrink: 0;
  }

  input[type=range] {
    flex: 1;
    height: 4px;
    accent-color: #1d9e75;
    cursor: pointer;
  }

  .val {
    font-size: 14px;
    font-weight: 500;
    min-width: 44px;
    text-align: right;
    color: #1a1a18;
  }

  .pattern-row {
    display: flex;
    gap: 8px;
  }

  .pat-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 20px;
    border: 1px solid #d3d1c7;
    background: #fff;
    font-size: 13px;
    color: #5f5e5a;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    text-align: center;
  }

  .pat-btn.active {
    background: #e1f5ee;
    border-color: #5dcaa5;
    color: #0f6e56;
    font-weight: 500;
  }

  .start-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: #1a1a18;
    color: #f7f5f0;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .start-btn:active { transform: scale(0.97); }
  .start-btn.running { background: #534ab7; }

  .tip {
    margin-top: 2rem;
    font-size: 12px;
    color: #b4b2a9;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>Dechový průvodce</h1>

<div class="breath-display">
  <div class="breath-circle" id="circle">
    <div class="breath-arrow" id="arrow">○</div>
    <div class="breath-word" id="word">—</div>
  </div>
  <div class="beat-counter" id="counter"></div>
</div>

<div class="beats-row" id="beatsRow"></div>

<div class="controls">
  <div class="row">
    <label>BPM</label>
    <input type="range" min="40" max="120" step="0.1" value="70.1" id="bpmRange">
    <span class="val" id="bpmVal">70.1</span>
  </div>

  <div class="row">
    <label>Vzor</label>
    <div class="pattern-row" style="flex:1">
      <button class="pat-btn active" data-p="4+4">4 + 4</button>
      <button class="pat-btn" data-p="2+2">2 + 2</button>
      <button class="pat-btn" data-p="3+1">3 + 1</button>
    </div>
  </div>

  <button class="start-btn" id="startBtn" onclick="togglePlay()">▶ Start</button>
</div>

<div class="tip">
  Uložte si stránku na plochu:<br>
  Safari → Sdílet → Přidat na plochu
</div>

<script>
const patterns = {
  '4+4': { in: [0,1,2,3], out: [4,5,6,7], total: 8 },
  '2+2': { in: [0,1], out: [2,3], total: 4 },
  '3+1': { in: [0,1,2], out: [3], total: 4 },
};

let bpm = 70.1;
let pat = '4+4';
let beat = 0;
let running = false;
let timer = null;


function renderBeats() {
  const cfg = patterns[pat];
  const row = document.getElementById('beatsRow');
  row.innerHTML = '';
  for (let i = 0; i < cfg.total; i++) {
    const d = document.createElement('div');
    d.className = 'beat-dot';
    d.id = 'bd' + i;
    d.textContent = cfg.in.includes(i) ? '↑' : '↓';
    row.appendChild(d);
  }
}

function tick() {
  const cfg = patterns[pat];
  document.querySelectorAll('.beat-dot').forEach(b => b.classList.remove('lit-in','lit-out'));
  const el = document.getElementById('bd' + beat);
  const isIn = cfg.in.includes(beat);
  if (el) el.classList.add(isIn ? 'lit-in' : 'lit-out');

  const circle = document.getElementById('circle');
  const arrow = document.getElementById('arrow');
  const word = document.getElementById('word');
  const counter = document.getElementById('counter');

  circle.className = 'breath-circle ' + (isIn ? 'inhale' : 'exhale');
  arrow.textContent = isIn ? '↑' : '↓';
  word.textContent = isIn ? 'Nádech' : 'Výdech';

  const phase = isIn ? cfg.in : cfg.out;
  const pos = phase.indexOf(beat) + 1;
  counter.textContent = `${pos} / ${phase.length}`;

  beat = (beat + 1) % cfg.total;
  timer = setTimeout(tick, 60000 / bpm);
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('startBtn');
  if (running) {
    beat = 0;

    btn.textContent = '■ Stop';
    btn.classList.add('running');
    tick();
  } else {
    clearTimeout(timer);
    btn.textContent = '▶ Start';
    btn.classList.remove('running');
    document.querySelectorAll('.beat-dot').forEach(b => b.classList.remove('lit-in','lit-out'));
    const circle = document.getElementById('circle');
    circle.className = 'breath-circle';
    document.getElementById('arrow').textContent = '○';
    document.getElementById('word').textContent = '—';
    document.getElementById('counter').textContent = '';
  }
}



document.getElementById('bpmRange').addEventListener('input', function() {
  bpm = parseFloat(this.value);
  document.getElementById('bpmVal').textContent = bpm.toFixed(1);
});

document.querySelectorAll('.pat-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    pat = this.dataset.p;
    document.querySelectorAll('.pat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    beat = 0;
    renderBeats();
  });
});

renderBeats();
</script>
</body>
</html>
