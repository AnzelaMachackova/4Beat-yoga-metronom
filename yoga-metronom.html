<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f7f5f0">
<title>Breath Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f5f0; color: #1a1a18;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 2rem 1.5rem 3rem; user-select: none;
  }
  h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #888780; margin-bottom: 2.5rem; }
  .breath-display { display: flex; flex-direction: column; align-items: center; margin-bottom: 2.5rem; }
  .breath-circle {
    width: 180px; height: 180px; border-radius: 50%;
    border: 1.5px solid #d3d1c7; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s; margin-bottom: 1rem;
  }
  .breath-circle.inhale { background: #e1f5ee; border-color: #5dcaa5; transform: scale(1.06); }
  .breath-circle.exhale { background: #eeedfe; border-color: #afa9ec; transform: scale(0.96); }
  .breath-arrow { font-size: 36px; line-height: 1; transition: color 0.15s; color: #b4b2a9; }
  .inhale .breath-arrow { color: #0f6e56; }
  .exhale .breath-arrow { color: #534ab7; }
  .breath-word { font-size: 18px; font-weight: 500; color: #888780; transition: color 0.15s; }
  .inhale .breath-word { color: #0f6e56; }
  .exhale .breath-word { color: #534ab7; }
  .beat-counter { font-size: 13px; color: #b4b2a9; height: 18px; }
  .beats-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 2.5rem; }
  .beat-dot {
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid #d3d1c7; background: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 18px; color: #b4b2a9;
    transition: background 0.08s, border-color 0.08s, transform 0.08s, color 0.08s;
  }
  .beat-dot.lit-in { background: #9fe1cb; border-color: #1d9e75; color: #085041; transform: scale(1.18); }
  .beat-dot.lit-out { background: #cecbf6; border-color: #7f77dd; color: #3c3489; transform: scale(1.18); }
  .controls { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 1.25rem; }
  .row { display: flex; align-items: center; gap: 8px; }
  .row label { font-size: 13px; color: #888780; width: 44px; flex-shrink: 0; }
  input[type=range] { flex: 1; height: 4px; accent-color: #1d9e75; cursor: pointer; min-width: 0; }
  .arrow-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid #d3d1c7; background: #fff;
    color: #5f5e5a; font-size: 20px; line-height: 1; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, transform 0.08s;
  }
  .arrow-btn:active { background: #e1f5ee; transform: scale(0.93); }
  .val { font-size: 14px; font-weight: 500; min-width: 44px; text-align: right; color: #1a1a18; }
  .pattern-row { display: flex; gap: 8px; }
  .pat-btn {
    flex: 1; padding: 8px 4px; border-radius: 20px; border: 1px solid #d3d1c7; background: #fff;
    font-size: 13px; color: #5f5e5a; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s; text-align: center;
  }
  .pat-btn.active { background: #e1f5ee; border-color: #5dcaa5; color: #0f6e56; font-weight: 500; }
  .tap-btn {
    width: 100%; padding: 14px; border-radius: 14px; border: 1.5px dashed #d3d1c7; background: #fff;
    font-size: 15px; font-weight: 500; color: #5f5e5a; cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.08s; text-align: center;
  }
  .tap-btn:active { transform: scale(0.97); background: #f0ede6; }
  .tap-btn.flashing { background: #e1f5ee; border-color: #1d9e75; color: #0f6e56; }
  .tap-hint { font-size: 12px; color: #b4b2a9; text-align: center; margin-top: -0.5rem; }
  .start-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none; background: #1a1a18;
    color: #f7f5f0; font-size: 18px; font-weight: 500; cursor: pointer;
    transition: background 0.15s, transform 0.1s; margin-top: 0.5rem;
  }
  .start-btn:active { transform: scale(0.97); }
  .start-btn.running { background: #534ab7; }
  .tip { margin-top: 2rem; font-size: 12px; color: #b4b2a9; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<h1>Breath Guide</h1>

<div class="breath-display">
  <div class="breath-circle" id="circle">
    <div class="breath-arrow" id="arrow">○</div>
    <div class="breath-word" id="word">—</div>
  </div>
  <div class="beat-counter" id="counter"></div>
</div>

<div class="beats-row" id="beatsRow"></div>

<div class="controls">
  <div class="row">
    <label>BPM</label>
    <button class="arrow-btn" onclick="changeBpm(-1)">&#8722;</button>
    <input type="range" min="40" max="120" step="0.1" value="70.1" id="bpmRange">
    <button class="arrow-btn" onclick="changeBpm(1)">&#43;</button>
    <span class="val" id="bpmVal">70.1</span>
  </div>

  <div class="row">
    <label>Pattern</label>
    <div class="pattern-row" style="flex:1">
      <button class="pat-btn active" data-p="4+4">4 + 4</button>
      <button class="pat-btn" data-p="2+2">2 + 2</button>
      <button class="pat-btn" data-p="3+1">3 + 1</button>
    </div>
  </div>

  <button class="tap-btn" id="tapBtn" onclick="tapTempo()">&#9833; Tap tempo</button>
  <div class="tap-hint" id="tapHint">Tap at least 3 times to set BPM</div>

  <button class="start-btn" id="startBtn" onclick="togglePlay()">&#9654; Start</button>
</div>

<div class="tip">
  Save to home screen:<br>
  Safari &#8594; Share &#8594; Add to Home Screen
</div>

<script>
var patterns = {
  '4+4': { i: [0,1,2,3], o: [4,5,6,7], t: 8 },
  '2+2': { i: [0,1], o: [2,3], t: 4 },
  '3+1': { i: [0,1,2], o: [3], t: 4 }
};

var bpm = 70.1;
var pat = '4+4';
var beat = 0;
var running = false;
var timer = null;
var tapTimes = [];
var tapResetTimer = null;

function renderBeats() {
  var cfg = patterns[pat];
  var row = document.getElementById('beatsRow');
  row.innerHTML = '';
  for (var i = 0; i < cfg.t; i++) {
    var d = document.createElement('div');
    d.className = 'beat-dot';
    d.id = 'bd' + i;
    d.textContent = cfg.i.indexOf(i) >= 0 ? '\u2191' : '\u2193';
    row.appendChild(d);
  }
}

function tick() {
  var cfg = patterns[pat];
  var dots = document.querySelectorAll('.beat-dot');
  for (var j = 0; j < dots.length; j++) {
    dots[j].classList.remove('lit-in', 'lit-out');
  }
  var el = document.getElementById('bd' + beat);
  var isIn = cfg.i.indexOf(beat) >= 0;
  if (el) el.classList.add(isIn ? 'lit-in' : 'lit-out');

  var circle = document.getElementById('circle');
  circle.className = 'breath-circle ' + (isIn ? 'inhale' : 'exhale');
  document.getElementById('arrow').textContent = isIn ? '\u2191' : '\u2193';
  document.getElementById('word').textContent = isIn ? 'Inhale' : 'Exhale';

  var phase = isIn ? cfg.i : cfg.o;
  var pos = phase.indexOf(beat) + 1;
  document.getElementById('counter').textContent = pos + ' / ' + phase.length;

  beat = (beat + 1) % cfg.t;
  timer = setTimeout(tick, 60000 / bpm);
}

function togglePlay() {
  running = !running;
  var btn = document.getElementById('startBtn');
  if (running) {
    beat = 0;
    btn.textContent = '\u25a0 Stop';
    btn.classList.add('running');
    tick();
  } else {
    clearTimeout(timer);
    btn.textContent = '\u25b6 Start';
    btn.classList.remove('running');
    var dots = document.querySelectorAll('.beat-dot');
    for (var j = 0; j < dots.length; j++) dots[j].classList.remove('lit-in', 'lit-out');
    document.getElementById('circle').className = 'breath-circle';
    document.getElementById('arrow').textContent = '\u25cb';
    document.getElementById('word').textContent = '\u2014';
    document.getElementById('counter').textContent = '';
  }
}

function changeBpm(delta) {
  bpm = parseFloat((bpm + delta).toFixed(1));
  if (bpm < 40) bpm = 40;
  if (bpm > 120) bpm = 120;
  document.getElementById('bpmRange').value = bpm;
  document.getElementById('bpmVal').textContent = bpm.toFixed(1);
}

function tapTempo() {
  var now = Date.now();
  if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 3000) {
    tapTimes = [];
  }
  tapTimes.push(now);

  var btn = document.getElementById('tapBtn');
  btn.classList.add('flashing');
  setTimeout(function() { btn.classList.remove('flashing'); }, 150);

  if (tapTimes.length >= 2) {
    var total = 0;
    for (var i = 1; i < tapTimes.length; i++) total += tapTimes[i] - tapTimes[i-1];
    var avg = total / (tapTimes.length - 1);
    bpm = Math.round((60000 / avg) * 10) / 10;
    if (bpm < 40) bpm = 40;
    if (bpm > 120) bpm = 120;
    document.getElementById('bpmRange').value = bpm;
    document.getElementById('bpmVal').textContent = bpm.toFixed(1);
    document.getElementById('tapHint').textContent = bpm.toFixed(1) + ' BPM (' + tapTimes.length + ' taps)';
  } else {
    document.getElementById('tapHint').textContent = 'Keep tapping\u2026';
  }

  clearTimeout(tapResetTimer);
  tapResetTimer = setTimeout(function() {
    tapTimes = [];
    document.getElementById('tapHint').textContent = 'Tap at least 3 times to set BPM';
  }, 3000);
}

document.getElementById('bpmRange').addEventListener('input', function() {
  bpm = parseFloat(this.value);
  document.getElementById('bpmVal').textContent = bpm.toFixed(1);
  tapTimes = [];
  document.getElementById('tapHint').textContent = 'Tap at least 3 times to set BPM';
});

var patBtns = document.querySelectorAll('.pat-btn');
for (var k = 0; k < patBtns.length; k++) {
  patBtns[k].addEventListener('click', function() {
    pat = this.getAttribute('data-p');
    for (var m = 0; m < patBtns.length; m++) patBtns[m].classList.remove('active');
    this.classList.add('active');
    beat = 0;
    renderBeats();
  });
}

renderBeats();
</script>
</body>
</html>
